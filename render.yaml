services:
  - type: web
    name: studentunion-backend
    env: node
    plan: free
    rootDir: proj/project
    buildCommand: npm install && npx prisma generate --schema=./backend/prisma/schema.prisma
    startCommand: node backend/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: studentunion-db # Make sure this matches your DB name on Render
          column: connectionString
